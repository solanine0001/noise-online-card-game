<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4efe7">
  <title>NOISE</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main id="app" class="app" aria-live="polite">
    <section class="boot">
      <p class="eyebrow">NOISE</p>
      <h1>接続中</h1>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="rulebookModal" class="rulebook-modal" hidden>
    <section class="rulebook-shell" role="dialog" aria-modal="true" aria-label="NOISE ルールブック">
      <header class="rulebook-bar">
        <div>
          <p class="eyebrow">NOISE</p>
          <h2>ルールブック</h2>
        </div>
        <button class="ghost" type="button" data-rulebook-close>閉じる</button>
      </header>
      <iframe id="rulebookFrame" class="rulebook-frame" title="NOISE ルールブック"></iframe>
    </section>
  </div>
  <script src="/client.js" defer></script>
</body>
</html>
